<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholarly Insight — Discover arXiv Research</title>
    <meta name="description" content="Search, browse, and stay updated with scholarly articles across scientific disciplines. Powered by the arXiv API with personalized favorites, alerts, and discussion threads." />
    <meta property="og:title" content="Scholarly Insight" />
    <meta property="og:description" content="Discover, track, and discuss the latest research from arXiv." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>" />
    <script>
      (function() {
        try {
          var saved = localStorage.getItem("theme");
          if (saved) {
            document.documentElement.setAttribute("data-theme", saved);
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
